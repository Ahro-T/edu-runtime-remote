services:
  postgres:
    image: docker.io/library/postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: edu_runtime
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edu_runtime"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./vault:/app/vault
      - ./wiki-vault:/app/wiki-vault
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    ports:
      - "3100:3100"
    environment:
      DISCORD_TOKEN: ${OPENCLAW_DISCORD_TOKEN}
      DISCORD_GUILD_ID: ${OPENCLAW_DISCORD_GUILD_ID}
      RUNTIME_API_URL: http://app:3000
      VLLM_URL: ${VLLM_URL:-https://llm.agentic-ai-gist.org}
      VLLM_MODEL: ${VLLM_MODEL:-google/gemma-4-27b-it}
    volumes:
      - ./workspaces/teacher:/workspace
      - ./scripts/openclaw-entrypoint.sh:/app/openclaw-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/app/openclaw-entrypoint.sh"]
    command: []
    depends_on:
      - app

  curriculum-cron:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    volumes:
      - ./vault:/app/vault:ro
      - ./wiki-vault:/app/wiki-vault
      - ./scripts:/app/scripts:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Curriculum cron started"
        while true; do
          echo "[$(date -Iseconds)] Running wiki lint + index generation..."
          cd /app && bash /app/scripts/generate-index.sh 2>&1 || echo "generate-index failed"
          echo "[$(date -Iseconds)] Done. Sleeping 6h."
          sleep 21600
        done
