# Development overrides — applied automatically by Docker Compose when present.
# Provides hot-reload via source bind-mount and Node.js debug port.
services:
  app:
    build:
      target: builder
    command: ["node", "--watch", "--inspect=0.0.0.0:9229", "dist/main.js"]
    volumes:
      - ./src:/app/src
      - ./vault:/app/vault
    ports:
      - "3001:3000"
      - "9230:9229"
    environment:
      LOG_LEVEL: debug
